/* ═══════ FULLSCREEN SEARCH MODAL ═══════ */
function SearchModal({ open, onClose, onSelect, title, groupedOptions, options, value }) {
  const [q, setQ] = useState("");
  const ref = useRef(null);
  useEffect(() => { if (open) { setQ(""); setTimeout(() => ref.current?.focus(), 100); } }, [open]);
  const filtered = useMemo(() => {
    const s = q.toLowerCase();
    if (groupedOptions) {
      const r = [];
      Object.entries(groupedOptions).forEach(([g, it]) => { const m = it.filter(i => i.toLowerCase().includes(s)); if (m.length) r.push({ group: g, items: m }); });
      return r;
    }
    return (options || []).filter(o => o.toLowerCase().includes(s));
  }, [q, options, groupedOptions]);
  if (!open) return null;
  const pick = v => { onSelect(v); onClose(); };
  return (
    <div className="fixed inset-0 z-50 bg-white flex flex-col" style={{ paddingTop: "env(safe-area-inset-top)" }}>
      <div className="flex items-center gap-3 px-4 py-3 border-b border-stone-200 bg-stone-50">
        <button onClick={onClose} className="w-10 h-10 flex items-center justify-center rounded-full text-stone-500 active:bg-stone-200 text-xl flex-shrink-0">←</button>
        <div className="flex-1 relative">
          <input ref={ref} value={q} onChange={e => setQ(e.target.value)} placeholder={`Search ${title.toLowerCase()}...`}
            className="w-full pl-10 pr-10 py-3 bg-white border border-stone-200 rounded-xl outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
            style={{ fontSize: 16 }} autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" />
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400" width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" strokeWidth="1.5" /><path d="M12.5 12.5l3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /></svg>
          {q && <button onClick={() => setQ("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 w-6 h-6 flex items-center justify-center">✕</button>}
        </div>
      </div>
      <div className="flex-1 overflow-y-auto overscroll-contain" style={{ WebkitOverflowScrolling: "touch" }}>
        {groupedOptions ? (
          filtered.length === 0 ? <div className="px-6 py-8 text-center text-stone-400 text-sm">No matches for "{q}"</div> :
          filtered.map(({ group, items }) => (
            <div key={group}>
              <div className="sticky top-0 px-5 py-2 text-xs font-bold uppercase tracking-wider text-stone-400 bg-stone-50 border-b border-stone-100">{group}</div>
              {items.map(item => (
                <button key={item} onClick={() => pick(item)} className={`w-full text-left px-5 py-4 border-b border-stone-100 active:bg-amber-50 transition-colors flex items-center justify-between ${value === item ? "bg-amber-50" : ""}`}>
                  <span className={`text-base ${value === item ? "text-amber-700 font-semibold" : "text-stone-700"}`}>{item}</span>
                  {value === item && <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10l4 4 8-8" stroke="#d97706" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" /></svg>}
                </button>
              ))}
            </div>
          ))
        ) : (
          filtered.length === 0 ? <div className="px-6 py-8 text-center text-stone-400 text-sm">No matches for "{q}"</div> :
          filtered.map(item => (
            <button key={item} onClick={() => pick(item)} className={`w-full text-left px-5 py-4 border-b border-stone-100 active:bg-amber-50 transition-colors flex items-center justify-between ${value === item ? "bg-amber-50" : ""}`}>

}

/* ═══════ PO GEN ═══════ */
function genPO(data) {
  const sups = new Set([data.tile.supplier, data.coping.supplier, data.surface.supplier]);
  const today = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  const poBase = `PO-${Date.now().toString(36).toUpperCase()}`;
  const pos = [];
  for (const sup of sups) {
    const lines = [];
    if (data.tile.supplier === sup) data.tile.rows.forEach(r => { const sq = tsf(r.linearFt); const rolled = r.size === "1x2"; lines.push({ cat: "Waterline Tile", item: `${r.name}${r.color ? " – " + r.color : ""}`, size: r.size, area: r.label, lf: r.linearFt, qty: rolled ? sq.toFixed(1) : (sq * OV).toFixed(1), unit: "sq ft", note: rolled ? "" : "15% overage" }); });
    if (data.coping.supplier === sup) data.coping.rows.forEach(r => { lines.push({ cat: "Coping", item: `${r.stone}${r.stone ? " – " : ""}${r.edge}`, size: r.size, area: r.label, lf: r.linearFt, qty: Math.ceil(cpcs(r.linearFt, r.size, r.edge) * OV).toString(), unit: "pieces", note: "15% overage" }); });
    if (data.surface.supplier === sup) lines.push({ cat: "Raised Surface", item: `${data.surface.series}${data.surface.color ? " – " + data.surface.color : ""}`, size: data.surface.size, area: "Raised Wall", lf: data.surface.linearFt, qty: ((Number(data.surface.linearFt)||0) * OV).toFixed(1), unit: "sq ft", note: "15% overage" });
    if (lines.length) pos.push({ supplier: sup, lines, poNum: pos.length ? `${poBase}-${pos.length + 1}` : poBase });
  }
  return { pos, today, client: data.clientName, address: data.address };
}

function POSheet({ po, today, client, address, onClose, onBack }) {
  const print = () => {
    const w = window.open("", "_blank"); if (!w) return;
    let lastCat = "";
    const rows = po.lines.map(l => { let c = ""; if (l.cat !== lastCat) { lastCat = l.cat; c = `<tr><td colspan="5" style="background:#f5f0eb;font-weight:700;color:#44403c;padding:8px 12px;font-size:12px;text-transform:uppercase;letter-spacing:0.03em">${l.cat}</td></tr>`; }
      return c + `<tr><td style="padding:10px 12px;border-bottom:1px solid #e7e5e4">${l.item}<br><span style="color:#a8a29e;font-size:11px">${l.size} · ${l.area}</span></td><td style="padding:10px 12px;border-bottom:1px solid #e7e5e4;text-align:right">${l.lf}</td><td style="padding:10px 12px;border-bottom:1px solid #e7e5e4;text-align:right;font-weight:700">${l.qty}</td><td style="padding:10px 12px;border-bottom:1px solid #e7e5e4">${l.unit}</td><td style="padding:10px 12px;border-bottom:1px solid #e7e5e4;color:#a8a29e;font-size:11px">${l.note}</td></tr>`; }).join("");

e</div><div style="flex:1;border-top:1px solid #78716c;padding-top:6px;font-size:11px;color:#78716c">Date</div></div><div style="margin-top:32px;padding-top:12px;border-top:1px solid #e7e5e4;font-size:11px;color:#a8a29e;text-align:center">Generated ${today}</div></body></html>`);

function EquipmentPage({ clientName, address }) {
  const [brand, setBrand] = useState("Jandy");
  const [rows, setRows] = useState(() => EQUIP_CATS.map(c => ({ ...c, description: c.def, qty: c.defQty, notes: "" })));
  const [openCats, setOpenCats] = useState({});
  const [poData, setPoData] = useState(null);
  const [eqSearch, setEqSearch] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [uploadStatus, setUploadStatus] = useState(null);
  const [showContractInput, setShowContractInput] = useState(false);
  const [contractText, setContractText] = useState("");
  const contractRef = useRef(null);

  const toggleCat = id => setOpenCats(o => ({ ...o, [id]: !o[id] }));
  const updateRow = (idx, field, val) => { setRows(prev => { const r = [...prev]; r[idx] = { ...r[idx], [field]: val }; return r; }); };

  const applyParsed = (parsed) => {
    if (parsed.brand && BRANDS.includes(parsed.brand)) setBrand(parsed.brand);
    if (parsed.items) {
      setRows(prev => prev.map(row => {
        const match = parsed.items[row.id];
        if (match && match.description) return { ...row, description: match.description, qty: match.qty || 0, notes: match.notes || "" };
        return row;
      }));
      const newOpen = {};
      EQUIP_CATS.forEach(c => { if (parsed.items[c.id]?.qty > 0) newOpen[c.id] = true; });
      setOpenCats(newOpen);
    }
  };

  const analyzeContract = async (inputText) => {
    try {
      setShowContractInput(false);
      setContractText("");
      setUploading(true);
      setUploadStatus("analyzing");

      const catIds = EQUIP_CATS.map(c => c.id);
      const jm = JSON.stringify(JANDY_MODELS);
      const pm = JSON.stringify(PENTAIR_MODELS);

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: "You extract pool equipment from contracts. Respond with ONLY valid JSON, no markdown fences, no explanation.",
          messages: [{ role: "user", content: "Analyze this pool contract. Extract equipment into IDs: " + catIds.join(", ") +
            ". Jandy: " + jm + ". Pentair: " + pm +
            ". RULES: 3way_valves=1/diverter (suction, return, feature, spillover, solar). 2way_valves=1/isolated line (feature, jets, cleaner). transformers=12W/light pick 100W/300W/600W. check_valves=Combo qty 3. Blower if spa. Lights 3avg 4-5large. Default Jandy." +
            "\n\nCONTRACT:\n" + inputText +
            '\n\nJSON: {"brand":"Jandy","clientName":"","address":"","items":{"automation":{"description":"","qty":1,"notes":""},"pump":{"description":"","qty":1,"notes":""},"extra_pump":{"description":"","qty":1,"notes":""},"heater":{"description":"","qty":1,"notes":""},"filter":{"description":"","qty":1,"notes":""},"sanitation":{"description":"","qty":1,"notes":""},"pool_lights":{"description":"","qty":3,"notes":""},"water_feature":{"description":"","qty":0,"notes":""},"blower":{"description":"","qty":0,"notes":""},"transformers":{"description":"","qty":1,"notes":""},"3way_valves":{"description":"","qty":3,"notes":""},"2way_valves":{"description":"","qty":2,"notes":""},"check_valves":{"description":"","qty":3,"notes":""},"autofill":{"description":"","qty":1,"notes":""},"extras":{"description":"","qty":0,"notes":""}}}' }]
        })
      });

      if (!response.ok) throw new Error("API " + response.status);
      const data = await response.json();
      const respText = (data.content || []).map(b => b.text || "").filter(Boolean).join("");
      if (!respText) throw new Error("Empty");
      const clean = respText.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
      applyParsed(JSON.parse(clean));
      setUploadStatus("done");
      setTimeout(() => setUploadStatus(null), 3000);
    } catch (err) {
      console.error("Analysis error:", err);
      setUploadStatus("error");
      setTimeout(() => setUploadStatus(null), 4000);
    } finally {
      setUploading(false);
    }
  };

  const handleGenPO = () => {
    const today = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    const poNum = `EQ-${Date.now().toString(36).toUpperCase()}`;
    const lines = rows.filter(r => r.qty > 0 && r.description).map(r => ({
      item: r.description,
      partNum: PART_NUMS[r.description] || "",
      qty: r.qty,
      notes: r.notes,
    }));
    setPoData({ lines, today, poNum, client: clientName, address, brand });
  };

  const handleEqSearchSelect = v => {
    if (eqSearch == null) return;
    updateRow(eqSearch, "description", v);
  };

  const filledCount = rows.filter(r => r.qty > 0 && r.description).length;

  return (
    <div className="px-4 pt-4 pb-6">
      {/* Analyze Contract */}
      <div className="mb-4">
        <button
          onClick={() => !uploading && setShowContractInput(true)}
          disabled={uploading}
          className={`w-full py-4 rounded-2xl font-semibold text-base flex items-center justify-center gap-3 transition-all min-h-[56px] border-2 border-dashed ${uploading ? "border-amber-400 bg-amber-50 text-amber-700" : uploadStatus === "done" ? "border-green-400 bg-green-50 text-green-700" : uploadStatus === "error" ? "border-red-400 bg-red-50 text-red-700" : "border-stone-300 bg-white text-stone-600 active:bg-stone-50"}`}
        >
          {uploadStatus === "analyzing" && <><span className="animate-pulse">🤖</span> AI analyzing...</>}
          {uploadStatus === "done" && <><span>✅</span> Equipment auto-filled!</>}
          {uploadStatus === "error" && <><span>❌</span> Failed — tap to retry</>}
          {!uploadStatus && !uploading && <>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="currentColor" strokeWidth="1.5" /><path d="M7 7h6M7 10h6M7 13h3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /></svg>
            Analyze Contract
          </>}
        </button>
        <p className="text-xs text-stone-400 text-center mt-1.5">Paste contract text → AI auto-fills all equipment & quantities</p>
      </div>

      <div className="mb-4">
        <F label="Primary Brand">
          <Sel value={brand} onChange={setBrand} options={BRANDS} />
        </F>
      </div>
      <p className="text-xs text-stone-400 mb-4">{filledCount} of {EQUIP_CATS.length} items configured</p>

      {rows.map((row, idx) => {
        const models = getModels(brand, row.id);
        return (
          <Sec key={row.id} title={row.label} icon={row.icon} open={!!openCats[row.id]} onToggle={() => toggleCat(row.id)}
            count={row.qty > 0 && row.description ? row.qty : null}>
            <div className="space-y-3 mt-3">
              <F label="Description">
                {models.length > 0 ? (
                  <PkBtn value={row.description} placeholder="Tap to select model..." onClick={() => setEqSearch(idx)} />
                ) : (
                  <I value={row.description} onChange={v => updateRow(idx, "description", v)} placeholder="Enter description" />
                )}
              </F>
              <div className="grid grid-cols-2 gap-3">
                <F label="Qty">
                  <div className="flex items-center gap-2">
                    <button onClick={() => updateRow(idx, "qty", Math.max(0, row.qty - 1))} className="w-12 h-12 flex items-center justify-center rounded-lg bg-white border border-stone-200 text-stone-500 text-xl active:bg-stone-100">−</button>
                    <div className="flex-1 text-center font-mono text-lg font-bold text-stone-800">{row.qty}</div>
                    <button onClick={() => updateRow(idx, "qty", row.qty + 1)} className="w-12 h-12 flex items-center justify-center rounded-lg bg-white border border-stone-200 text-stone-500 text-xl active:bg-stone-100">+</button>
                  </div>
                </F>
                <F label="Notes"><I value={row.notes} onChange={v => updateRow(idx, "notes", v)} placeholder="Optional" /></F>
              </div>
            </div>
          </Sec>
        );
      })}

      {/* Generate Equipment PO */}
      <button onClick={handleGenPO} className="w-full py-4 rounded-2xl text-white font-semibold text-base flex items-center justify-center gap-3 active:scale-[0.98] transition-all mb-2 min-h-[56px]" style={{ background: "linear-gradient(135deg,#292524,#44403c)" }}>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 2h8l4 4v10a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2z" stroke="currentColor" strokeWidth="1.5" /><path d="M14 2v4h4M8 10h4M8 13h6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /></svg>
        Generate Equipment PO
      </button>

      {/* Equipment search modal */}
      <SearchModal
        open={eqSearch != null}
        onClose={() => setEqSearch(null)}
        title="Select Model"
        options={eqSearch != null ? getModels(brand, rows[eqSearch]?.id) : []}
        value={eqSearch != null ? rows[eqSearch]?.description : ""}
        onSelect={handleEqSearchSelect}
      />

      {/* Equipment PO Sheet */}
      {poData && (
        <div className="fixed inset-0 z-50 flex items-end" style={{ background: "rgba(0,0,0,0.45)" }} onClick={() => setPoData(null)}>
          <div className="bg-white rounded-t-3xl w-full flex flex-col" style={{ maxHeight: "90vh", paddingBottom: "env(safe-area-inset-bottom)" }} onClick={e => e.stopPropagation()}>
            <div className="flex items-center gap-3 px-5 pt-5 pb-3 border-b border-stone-200">
              <div className="flex-1 min-w-0"><h3 style={{ fontFamily: "'Georgia',serif" }} className="text-lg font-bold text-stone-800 truncate">Equipment PO</h3><p className="text-xs text-stone-400 truncate">{poData.brand} · {poData.poNum}</p></div>
              <button onClick={() => setPoData(null)} className="w-10 h-10 flex items-center justify-center rounded-full bg-stone-100 text-stone-500 text-xl flex-shrink-0">×</button>
            </div>
            <div className="flex-1 overflow-y-auto px-5 py-4" style={{ WebkitOverflowScrolling: "touch" }}>
              <div className="flex justify-center mb-4"><img src={LOGO} alt="Logo" style={{ height: 44 }} /></div>
              <div className="text-xs text-stone-400 mb-3 space-y-0.5">
                <div className="flex justify-between"><span>Client: <strong className="text-stone-600">{poData.client}</strong></span><span>{poData.today}</span></div>
                {poData.address && <div>Address: <strong className="text-stone-600">{poData.address}</strong></div>}
              </div>
              {poData.lines.map((l, i) => (
                <div key={i} className="flex items-center justify-between py-3 border-b border-stone-100">
                  <div className="min-w-0 flex-1 mr-3">
                    <div className="text-sm font-medium text-stone-700">{l.item}</div>
                    <div className="text-xs text-stone-400 mt-0.5">{l.partNum}{l.notes ? ` · ${l.notes}` : ""}</div>
                  </div>
                  <div className="text-right flex-shrink-0">
                    <div className="font-mono font-bold text-lg text-stone-800">{l.qty}</div>
                    <div className="text-xs text-stone-400">ea</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="px-5 pt-3 pb-4 border-t border-stone-200">
              <button onClick={() => {
                const w = window.open("", "_blank"); if (!w) return;
                const trs = poData.lines.map(l => `<tr><td style="padding:10px 12px;border-bottom:1px solid #e7e5e4">${l.item}</td><td style="padding:10px 12px;border-bottom:1px solid #e7e5e4;color:#78716c;font-size:12px">${l.partNum}</td><td style="padding:10px 12px;border-bottom:1px solid #e7e5e4;text-align:center;font-weight:700">${l.qty}</td><td style="padding:10px 12px;border-bottom:1px solid #e7e5e4;color:#a8a29e;font-size:11px">${l.notes}</td></tr>`).join("");
                w.document.write(`<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width"><title>EQ PO ${poData.poNum}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;padding:24px;color:#1c1917;font-size:13px}@media print{body{padding:16px}@page{margin:0.5in}}</style></head><body><div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #292524;padding-bottom:14px;margin-bottom:16px"><div><img src="${LOGO}" style="height:50px;margin-bottom:8px" /><div style="font-size:20px;font-weight:700;font-family:Georgia,serif">Equipment Purchase Order</div><div style="color:#78716c;margin-top:2px;font-size:13px">${poData.brand}</div></div><div style="text-align:right;font-size:12px;color:#78716c;line-height:1.8"><div><b style="color:#292524">PO:</b> ${poData.poNum}</div><div><b style="color:#292524">Date:</b> ${poData.today}</div><div><b style="color:#292524">Client:</b> ${poData.client}</div>${poData.address ? `<div><b style="color:#292524">Address:</b> ${poData.address}</div>` : ""}</div></div><table style="width:100%;border-collapse:collapse"><thead><tr><th style="text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;color:#78716c;border-bottom:2px solid #d6d3d1">Item</th><th style="text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;color:#78716c;border-bottom:2px solid #d6d3d1">Part #</th><th style="text-align:center;padding:8px 12px;font-size:11px;text-transform:uppercase;color:#78716c;border-bottom:2px solid #d6d3d1">Qty</th><th style="padding:8px 12px;font-size:11px;text-transform:uppercase;color:#78716c;border-bottom:2px solid #d6d3d1">Notes</th></tr></thead><tbody>${trs}</tbody></table><div style="margin-top:48px;display:flex;gap:40px"><div style="flex:1;border-top:1px solid #78716c;padding-top:6px;font-size:11px;color:#78716c">Authorized Signature</div><div style="flex:1;border-top:1px solid #78716c;padding-top:6px;font-size:11px;color:#78716c">Date</div></div><div style="margin-top:32px;padding-top:12px;border-top:1px solid #e7e5e4;font-size:11px;color:#a8a29e;text-align:center">Generated ${poData.today}</div></body></html>`);
                w.document.close(); setTimeout(() => w.print(), 250);
              }} className="w-full py-4 rounded-xl bg-stone-800 text-white font-semibold text-base active:bg-stone-900 transition-colors flex items-center justify-center gap-2 min-h-[52px]">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4.5 6.75V2.25h9v4.5" stroke="currentColor" strokeWidth="1.5" /><rect x="2.25" y="6.75" width="13.5" height="6.75" rx="1" stroke="currentColor" strokeWidth="1.5" /><path d="M4.5 11.25h9v4.5h-9z" stroke="currentColor" strokeWidth="1.5" /></svg>
                Print / Save PDF
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Contract paste modal */}
      {showContractInput && (
        <div className="fixed inset-0 z-50 bg-white flex flex-col" style={{ paddingTop: "env(safe-area-inset-top)" }}>
          <div className="flex items-center gap-3 px-4 py-3 border-b border-stone-200 bg-stone-50">
            <button onClick={() => { setShowContractInput(false); setContractText(""); }} className="w-10 h-10 flex items-center justify-center rounded-full text-stone-500 active:bg-stone-200 text-xl flex-shrink-0">←</button>
            <div className="flex-1">
              <h3 className="text-base font-bold text-stone-800">Paste Contract Text</h3>
              <p className="text-xs text-stone-400">Copy text from your contract PDF and paste it below</p>
            </div>
          </div>
          <div className="flex-1 p-4 overflow-hidden flex flex-col">
            <textarea
              ref={contractRef}
              value={contractText}
              onChange={e => setContractText(e.target.value)}
              placeholder={"Paste the full contract text here...\n\nTip: Open your contract PDF, Select All (Ctrl+A), Copy (Ctrl+C), then paste here."}
              className="flex-1 w-full p-4 bg-white border border-stone-200 rounded-xl text-sm text-stone-700 placeholder-stone-400 outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent resize-none"
              style={{ fontSize: 16, minHeight: 200 }}
              autoFocus
            />
          </div>
          <div className="px-4 pb-4" style={{ paddingBottom: "max(16px, env(safe-area-inset-bottom))" }}>
            <button
              onClick={() => contractText.trim().length > 50 && analyzeContract(contractText.trim())}
              disabled={contractText.trim().length < 50}
              className={`w-full py-4 rounded-2xl font-semibold text-base flex items-center justify-center gap-3 min-h-[56px] transition-all ${contractText.trim().length >= 50 ? "text-white active:scale-[0.98]" : "bg-stone-100 text-stone-400"}`}
              style={contractText.trim().length >= 50 ? { background: "linear-gradient(135deg,#292524,#44403c)" } : {}}
            >
              <span>🤖</span>
              {contractText.trim().length < 50 ? "Paste contract text above" : "Analyze & Auto-Fill Equipment"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

    const tt = effRows.filter(r => r.size !== "1x2").reduce((s, r) => s + tsf(r.linearFt), 0) * OV;
    const re = effRows.filter(r => r.size === "1x2").reduce((s, r) => s + tsf(r.linearFt), 0);
    const cbs = {}; data.coping.rows.forEach(r => { if (!cbs[r.size]) cbs[r.size] = { pcs: 0, stone: r.stone }; cbs[r.size].pcs += cpcs(r.linearFt, r.size, r.edge); });
    Object.keys(cbs).forEach(k => { cbs[k].pcs = Math.ceil(cbs[k].pcs * OV); });
    return { tt, re, cbs, sf: (Number(data.surface.linearFt)||0) * OV };
  }, [effRows, data.coping.rows, data.surface.linearFt]);

  const desc = r => { let s = r.name || "—"; if (r.color) s += ` – ${r.color}`; return s; };
  const e0 = effRows[0] || {};
  const items = [
    { label: "Waterline Tile", sub: `${desc(e0)} · ${e0.size || ""}`, val: summary.tt.toFixed(1), unit: "sq ft" },
    ...(summary.re > 0 ? [{ label: "Rolled Edge", sub: "1x2", val: summary.re.toFixed(1), unit: "sq ft" }] : []),
    ...Object.entries(summary.cbs).map(([sz, d]) => ({ label: `${sz} Coping`, sub: d.stone, val: String(d.pcs), unit: "pcs" })),
    { label: "Raised Surface", sub: `${data.surface.series} – ${data.surface.color} · ${data.surface.size}`, val: summary.sf.toFixed(1), unit: "sq ft" },
  ];

  const uniqSups = [...new Set([data.tile.supplier, data.coping.supplier, data.surface.supplier])];
  const handlePO = () => { setPoData(genPO({ ...data, tile: { ...data.tile, rows: effRows } })); };

  // Search modal handler
  const handleSearchSelect = v => {
    if (!search) return;
    const { section, rowIdx, field } = search;
    if (section === "tile") updateTile(rowIdx, field, v);
    else if (section === "coping") updateCoping(rowIdx, field, v);
    else if (section === "surface") {
      if (field === "series") setData(d => ({ ...d, surface: { ...d.surface, series: v, color: "" } }));
      else setData(d => ({ ...d, surface: { ...d.surface, color: v } }));
    }
  };

  const [page, setPage] = useState("materials");

  return (
    <div className="min-h-screen pb-6" style={{ fontFamily: "-apple-system,'SF Pro Text','Segoe UI',sans-serif", background: "linear-gradient(160deg,#f5f0eb 0%,#e8e0d8 100%)" }}>
      <div className="sticky top-0 z-30 px-5 pt-4 pb-0 border-b border-stone-200/50" style={{ background: "rgba(245,240,235,0.92)", backdropFilter: "blur(16px)", WebkitBackdropFilter: "blur(16px)", paddingTop: "max(16px, env(safe-area-inset-top))" }}>
        <div className="flex items-center justify-between mb-2">
          <img src={LOGO} alt="Dynamic Custom Pools" style={{ height: 36 }} />
        </div>
        <div className="mt-2 space-y-1.5">
          <div className="flex items-center gap-2">
            <span className="text-xs text-stone-400 w-14 flex-shrink-0">Client</span>
            <input value={data.clientName} onChange={e => setData({ ...data, clientName: e.target.value })} placeholder="Client name" className="flex-1 px-3 py-2 bg-white border border-stone-200 rounded-lg text-sm font-medium text-stone-700 placeholder-stone-300 outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" style={{ fontSize: 16 }} />
          </div>
          <div className="flex items-center gap-2">
            <span className="text-xs text-stone-400 w-14 flex-shrink-0">Address</span>
            <input value={data.address} onChange={e => setData({ ...data, address: e.target.value })} placeholder="Job site address" className="flex-1 px-3 py-2 bg-white border border-stone-200 rounded-lg text-sm text-stone-700 placeholder-stone-300 outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" style={{ fontSize: 16 }} />
          </div>
        </div>
        {/* ─── PAGE TABS ─── */}
        <div className="flex mt-3 -mb-px">
          {[["materials","Materials"],["equipment","Equipment"]].map(([k,label]) => (
            <button key={k} onClick={() => setPage(k)}
              className={`flex-1 py-3 text-sm font-semibold text-center transition-colors ${page === k ? "text-stone-800 border-b-2 border-stone-800" : "text-stone-400 border-b-2 border-transparent"}`}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {page === "materials" && (<div className="px-4 pt-4">
        {/* ─── TILE ─── */}
        <Sec title="Waterline Tile" icon="🔷" open={open.tile} onToggle={() => toggle("tile")} count={data.tile.rows.length}>
          <div className="mt-3 mb-4"><F label="Supplier"><Sel value={data.tile.supplier} onChange={chgTileSup} options={SUPS} /></F></div>
          <div className="space-y-3">
            {data.tile.rows.map((row, i) => {
              const eff = effRows[i]; const isPool = row.label.toLowerCase().includes("pool") && !row.label.toLowerCase().includes("rolled"); const canSame = !isPool && poolRow && row !== poolRow;
              return (
                <div key={i} className="bg-stone-50 rounded-xl p-4 relative">
                  <RmBtn onClick={() => rmTile(i)} />
                  <div className="grid grid-cols-2 gap-3">
                    <F label="Area"><I value={row.label} onChange={v => updateTile(i, "label", v)} placeholder="e.g. Pool" /></F>
                    <F label="Size">{row.sameAsPool ? <div className={`${ib} bg-stone-100 text-stone-500 flex items-center`}>{eff.size}</div> : <Sel value={row.size} onChange={v => updateTile(i, "size", v)} options={T_SZ} />}</F>
                    {canSame && <div className="col-span-2"><label className="flex items-center gap-3 py-3 px-4 bg-white border border-stone-200 rounded-xl active:bg-amber-50 transition-colors min-h-[52px]"><input type="checkbox" checked={!!row.sameAsPool} onChange={e => updateTile(i, "sameAsPool", e.target.checked)} className="w-6 h-6 rounded border-stone-300 accent-amber-500 flex-shrink-0" /><div className="min-w-0"><div className="text-sm font-medium text-stone-700">Same tile as Pool</div>{row.sameAsPool && poolRow && <div className="text-xs text-stone-400 truncate mt-0.5">{poolRow.name}{poolRow.color ? " – " + poolRow.color : ""} · {poolRow.size}</div>}</div></label></div>}
                    {!row.sameAsPool && (<>
                      <F label="Tile Series" span2><PkBtn value={row.name} placeholder="Tap to search..." onClick={() => setSearch({ section: "tile", rowIdx: i, field: "name", title: "Tile Series", groupedOptions: groups, value: row.name })} /></F>
                      <F label="Color / Variant" span2>{colors(row.name).length > 0 ? <PkBtn value={row.color} placeholder="Tap to search colors..." onClick={() => setSearch({ section: "tile", rowIdx: i, field: "color", title: "Colors", options: colors(row.name), value: row.color })} /> : <I value={row.color} onChange={v => updateTile(i, "color", v)} placeholder={row.name ? "Type color" : "Select series first"} />}</F>
                    </>)}
                    <F label="Linear ft"><I value={row.linearFt} onChange={v => updateTile(i, "linearFt", v)} type="number" /></F>
                    <F label="Sq ft"><Calc>{tsf(row.linearFt).toFixed(1)}</Calc></F>
                  </div>
                </div>
              );
            })}
          </div>
          <AddBtn onClick={addTile} label="Add tile row" />
        </Sec>

        {/* ─── COPING ─── */}
        <Sec title="Coping" icon="🧱" open={open.coping} onToggle={() => toggle("coping")} count={data.coping.rows.length}>
          <div className="mt-3 mb-4"><F label="Supplier"><Sel value={data.coping.supplier} onChange={chgCopingSup} options={SUPS} /></F>
          <p className="text-xs text-stone-400 mt-1.5">{data.coping.supplier === "Aqua Bella" ? "9 stone colors" : data.coping.supplier === "Keystone Tile" ? "Travertine, marble & porcelain bullnose" : "12+ travertine, marble & limestone"}</p></div>
          <div className="space-y-3">
            {data.coping.rows.map((row, i) => (
              <div key={i} className="bg-stone-50 rounded-xl p-4 relative">
                <RmBtn onClick={() => rmCoping(i)} />
                <div className="grid grid-cols-2 gap-3">
                  <F label="Area"><I value={row.label} onChange={v => updateCoping(i, "label", v)} placeholder="e.g. Pool" /></F>
                  <F label="Stone Color">
                    <PkBtn value={row.stone} placeholder="Tap to search..." onClick={() => setSearch({ section: "coping", rowIdx: i, field: "stone", title: "Coping Stone", groupedOptions: copingOptions, options: copingFlat, value: row.stone })} />
                  </F>
                  <F label="Edge"><Sel value={row.edge} onChange={v => updateCoping(i, "edge", v)} options={C_ED} /></F>
                  <F label="Size"><Sel value={row.size} onChange={v => updateCoping(i, "size", v)} options={C_SZ} /></F>
                  <F label="Linear ft"><I value={row.linearFt} onChange={v => updateCoping(i, "linearFt", v)} type="number" /></F>
                  <F label="Sq ft / Pcs"><Calc>{csf(row.linearFt, row.size, row.edge).toFixed(1)} ft² · {cpcs(row.linearFt, row.size, row.edge)} pcs</Calc></F>
                </div>
              </div>
            ))}
          </div>
          <AddBtn onClick={addCoping} label="Add coping row" />
        </Sec>

        {/* ─── RAISED SURFACES ─── */}
        <Sec title="Raised Surfaces" icon="🪨" open={open.surface} onToggle={() => toggle("surface")}>
          <div className="mt-3 space-y-3">
            <F label="Supplier"><Sel value={data.surface.supplier} onChange={chgSurfSup} options={SUPS} /></F>
            <F label="Type">
              <PkBtn value={data.surface.series} placeholder="Tap to search type..." onClick={() => setSearch({ section: "surface", rowIdx: 0, field: "series", title: "Surface Type", options: veneerSeries, value: data.surface.series })} />
            </F>
            <F label="Color">
              {veneerColors(data.surface.series).length > 0 ?
                <PkBtn value={data.surface.color} placeholder="Tap to search color..." onClick={() => setSearch({ section: "surface", rowIdx: 0, field: "color", title: "Surface Color", options: veneerColors(data.surface.series), value: data.surface.color })} /> :
                <I value={data.surface.color} onChange={v => setData({ ...data, surface: { ...data.surface, color: v } })} placeholder="Select type first" />
              }
            </F>
            <div className="grid grid-cols-2 gap-3">
              <F label="Size"><Sel value={data.surface.size} onChange={v => setData({ ...data, surface: { ...data.surface, size: v } })} options={S_SZ} /></F>
              <F label="Linear ft"><I value={data.surface.linearFt} onChange={v => setData({ ...data, surface: { ...data.surface, linearFt: v } })} type="number" /></F>
            </div>
            <Calc>{data.surface.linearFt} ft² → <strong>{((Number(data.surface.linearFt)||0) * OV).toFixed(1)} ft²</strong> w/ overage</Calc>
          </div>
        </Sec>

        {/* ─── SUMMARY ─── */}
        <Sec title="Order Summary" icon="📋" open={open.summary} onToggle={() => toggle("summary")} accent>
          <p className="text-xs text-stone-400 mt-3 mb-3">15% overage included</p>
          <div className="space-y-2.5">
            {items.map((it, i) => (
              <div key={i} className="flex items-center justify-between py-3 px-4 bg-white rounded-xl border border-amber-200">
                <div className="min-w-0 flex-1 mr-3"><div className="font-medium text-stone-700 text-sm">{it.label}</div><div className="text-xs text-stone-400 truncate">{it.sub}</div></div>
                <div className="text-right flex-shrink-0"><span className="text-xl font-bold text-stone-800 font-mono tabular-nums">{it.val}</span><span className="text-xs text-stone-400 ml-1">{it.unit}</span></div>
              </div>
            ))}
          </div>
          <div className="pt-3 mt-3 border-t border-amber-200 text-xs text-stone-400 space-y-0.5">
            <div><span className="text-stone-500 font-medium">Tile:</span> {data.tile.supplier}</div>
            <div><span className="text-stone-500 font-medium">Coping:</span> {data.coping.supplier}</div>
            <div><span className="text-stone-500 font-medium">Surface:</span> {data.surface.supplier}</div>
          </div>
        </Sec>

        {/* ─── GENERATE PO ─── */}
        <button onClick={handlePO} className="w-full py-4 rounded-2xl text-white font-semibold text-base flex items-center justify-center gap-3 active:scale-[0.98] transition-all mb-2 min-h-[56px]" style={{ background: "linear-gradient(135deg,#292524,#44403c)" }}>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 2h8l4 4v10a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2z" stroke="currentColor" strokeWidth="1.5" /><path d="M14 2v4h4M8 10h4M8 13h6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /></svg>
          Generate Purchase Order{uniqSups.length > 1 ? `s (${uniqSups.length})` : ""}
        </button>
        {uniqSups.length > 1 && <p className="text-xs text-stone-400 text-center mb-4">Separate POs for {uniqSups.join(" & ")}</p>}
      </div>)}

      {/* ═══════ EQUIPMENT PAGE ═══════ */}
      {page === "equipment" && (
        <EquipmentPage clientName={data.clientName} address={data.address} />
      )}

      {/* ─── SEARCH MODAL ─── */}
      <SearchModal
        open={!!search}
        onClose={() => setSearch(null)}
        title={search?.title || ""}
        groupedOptions={search?.groupedOptions}
        options={search?.options}
        value={search?.value}
        onSelect={handleSearchSelect}
      />

      {/* ─── PO MODALS ─── */}
      {poData && (poData.pos.length === 1 ?
        <POSheet po={poData.pos[0]} today={poData.today} client={poData.client} address={poData.address} onClose={() => setPoData(null)} /> :
        <POPicker pos={poData.pos} today={poData.today} client={poData.client} address={poData.address} onClose={() => setPoData(null)} />
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
